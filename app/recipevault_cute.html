<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RecipeVault 🧁 Cozy Recipe Finder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f5ecdd;
    --cream-deep: #efe2cd;
    --milk: #fbf6ee;
    --latte: #c9a079;
    --latte-deep: #a67c52;
    --cocoa: #6b4a32;
    --cocoa-dark: #4a3122;
    --pink: #e8a8a0;
    --pink-soft: #f3cfc8;
    --mint: #a8c0a0;
    --shadow: rgba(106, 74, 50, 0.18);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Quicksand', sans-serif;
    background:
      radial-gradient(circle at 15% 20%, #f7ecd9 0%, transparent 45%),
      radial-gradient(circle at 85% 70%, #f3ddd6 0%, transparent 45%),
      linear-gradient(160deg, #f5ecdd 0%, #efe0cc 100%);
    min-height: 100vh;
    color: var(--cocoa-dark);
    overflow-x: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(var(--latte) 1px, transparent 1px);
    background-size: 28px 28px;
    opacity: 0.06;
    pointer-events: none;
    z-index: 0;
  }

  .floaties { position: fixed; inset: 0; pointer-events: none; z-index: 1; overflow: hidden; }
  .floaty {
    position: absolute;
    font-size: 2rem;
    opacity: 0.5;
    animation: floatUp linear infinite;
  }
  @keyframes floatUp {
    0%   { transform: translateY(110vh) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.6; }
    90%  { opacity: 0.6; }
    100% { transform: translateY(-15vh) rotate(360deg); opacity: 0; }
  }

  .cat-walker {
    position: fixed;
    bottom: 8px;
    z-index: 5;
    animation: walk 22s linear infinite, bounce 0.5s ease-in-out infinite;
    pointer-events: none;
  }
  .cat-walker.two { animation-duration: 30s, 0.55s; animation-delay: 8s, 0s; }
  @keyframes walk {
    0%   { left: -10%; transform: scaleX(1); }
    49%  { left: 104%; transform: scaleX(1); }
    50%  { left: 104%; transform: scaleX(-1); }
    99%  { left: -10%; transform: scaleX(-1); }
    100% { left: -10%; transform: scaleX(1); }
  }
  @keyframes bounce { 0%,100% { margin-bottom: 0; } 50% { margin-bottom: 6px; } }
  .cat-walker .tail { transform-origin: 80px 50px; animation: tailwag 1.2s ease-in-out infinite; }
  @keyframes tailwag { 0%,100% { transform: rotate(0deg); } 50% { transform: rotate(-12deg); } }

  @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
  @keyframes wiggle { 0%,100% { transform: rotate(-6deg); } 50% { transform: rotate(6deg); } }

  .wrap {
    position: relative;
    z-index: 3;
    max-width: 820px;
    margin: 0 auto;
    padding: 48px 24px 120px;
  }

  header { text-align: center; margin-bottom: 38px; }
  .logo-cat {
    font-size: 4rem;
    display: inline-block;
    animation: bob 3s ease-in-out infinite;
  }
  h1 {
    font-family: 'Fredoka', sans-serif;
    font-size: 3.2rem;
    font-weight: 700;
    color: var(--cocoa);
    letter-spacing: -1px;
    margin: 6px 0 2px;
    text-shadow: 2px 3px 0 var(--cream-deep);
  }
  h1 .vault { color: var(--latte-deep); }
  .tagline {
    font-size: 1.05rem;
    color: var(--latte-deep);
    font-weight: 500;
  }
  .tagline .heart { color: var(--pink); animation: wiggle 2s ease-in-out infinite; display: inline-block; }

  .search-card {
    background: var(--milk);
    border-radius: 30px;
    padding: 30px;
    box-shadow: 0 14px 0 var(--cream-deep), 0 18px 30px var(--shadow);
    border: 3px solid #fff;
    margin-bottom: 30px;
  }
  .search-label {
    font-family: 'Fredoka', sans-serif;
    font-size: 1.15rem;
    color: var(--cocoa);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .search-row { display: flex; gap: 12px; flex-wrap: wrap; }
  input[type="text"] {
    flex: 1;
    min-width: 200px;
    font-family: 'Quicksand', sans-serif;
    font-size: 1rem;
    font-weight: 500;
    padding: 16px 20px;
    border: 2.5px solid var(--cream-deep);
    border-radius: 18px;
    background: #fff;
    color: var(--cocoa-dark);
    outline: none;
    transition: border 0.2s, box-shadow 0.2s;
  }
  input[type="text"]:focus {
    border-color: var(--latte);
    box-shadow: 0 0 0 4px var(--pink-soft);
  }
  input::placeholder { color: #c9b69e; }

  button.go {
    font-family: 'Fredoka', sans-serif;
    font-size: 1.05rem;
    font-weight: 600;
    padding: 16px 28px;
    border: none;
    border-radius: 18px;
    background: var(--latte-deep);
    color: #fff;
    cursor: pointer;
    box-shadow: 0 5px 0 var(--cocoa);
    transition: transform 0.12s, box-shadow 0.12s;
  }
  button.go:hover { transform: translateY(-2px); box-shadow: 0 7px 0 var(--cocoa); }
  button.go:active { transform: translateY(3px); box-shadow: 0 2px 0 var(--cocoa); }

  .chips { margin-top: 18px; display: flex; flex-wrap: wrap; gap: 9px; }
  .chip {
    font-family: 'Quicksand', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    padding: 8px 15px;
    border-radius: 14px;
    background: var(--cream);
    border: 2px solid var(--cream-deep);
    color: var(--latte-deep);
    cursor: pointer;
    transition: all 0.18s;
  }
  .chip:hover { background: var(--pink-soft); border-color: var(--pink); color: var(--cocoa); }
  .chip.active { background: var(--latte-deep); color: #fff; border-color: var(--latte-deep); }

  .results { display: flex; flex-direction: column; gap: 16px; }
  .recipe-card {
    background: var(--milk);
    border-radius: 22px;
    padding: 20px 24px;
    box-shadow: 0 8px 0 var(--cream-deep), 0 10px 18px var(--shadow);
    border: 2.5px solid #fff;
    display: flex;
    align-items: flex-start;
    gap: 16px;
    opacity: 0;
    transform: translateY(20px);
    animation: pop 0.5s ease forwards;
  }
  @keyframes pop { to { opacity: 1; transform: translateY(0); } }
  .recipe-emoji {
    font-size: 2.4rem;
    flex-shrink: 0;
    animation: bob 3s ease-in-out infinite;
  }
  .recipe-info { flex: 1; }
  .recipe-title {
    font-family: 'Fredoka', sans-serif;
    font-size: 1.25rem;
    font-weight: 600;
    color: var(--cocoa);
    margin-bottom: 6px;
  }
  .recipe-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }
  .tag {
    font-size: 0.78rem;
    font-weight: 600;
    padding: 4px 11px;
    border-radius: 11px;
  }
  .tag.flavour { background: var(--pink-soft); color: #a85c52; }
  .tag.occasion { background: #d8e4d0; color: #5a7048; }
  .tag.steps { background: var(--cream-deep); color: var(--latte-deep); }
  .recipe-source {
    font-size: 0.8rem;
    color: #b09c84;
    font-weight: 500;
    margin-top: 4px;
  }

  .welcome {
    text-align: center;
    padding: 30px 20px;
    color: var(--latte-deep);
  }
  .welcome .big { font-size: 3.5rem; display: block; margin-bottom: 12px; animation: bob 3s infinite; }
  .welcome p { font-size: 1rem; font-weight: 500; line-height: 1.6; }

  .loading { text-align: center; padding: 30px; }
  .loading .spin { font-size: 2.6rem; display: inline-block; animation: spin 1.1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p { margin-top: 10px; color: var(--latte-deep); font-weight: 600; }

  /* view recipe button */
  .view-btn {
    margin-top: 10px;
    font-family: 'Fredoka', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    padding: 7px 16px;
    border: none;
    border-radius: 12px;
    background: var(--latte-deep);
    color: #fff;
    cursor: pointer;
    box-shadow: 0 3px 0 var(--cocoa);
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .view-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 0 var(--cocoa); }
  .view-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 var(--cocoa); }

  /* popup */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(74, 49, 34, 0.55);
    z-index: 50;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-box {
    background: var(--milk);
    border-radius: 26px;
    padding: 30px;
    max-width: 560px;
    width: 100%;
    max-height: 82vh;
    overflow-y: auto;
    box-shadow: 0 18px 50px rgba(0,0,0,0.3);
    border: 3px solid #fff;
    position: relative;
  }
  .modal-close {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 34px;
    height: 34px;
    border: none;
    border-radius: 50%;
    background: var(--cream-deep);
    color: var(--cocoa);
    font-size: 1rem;
    cursor: pointer;
    font-weight: bold;
  }
  .modal-close:hover { background: var(--pink-soft); }
  .modal-title {
    font-family: 'Fredoka', sans-serif;
    font-size: 1.6rem;
    color: var(--cocoa);
    margin-bottom: 12px;
    padding-right: 30px;
  }
  .modal-section {
    font-family: 'Fredoka', sans-serif;
    font-size: 1.15rem;
    color: var(--latte-deep);
    margin: 18px 0 10px;
  }
  .modal-list { padding-left: 22px; color: var(--cocoa-dark); }
  .modal-list li { margin-bottom: 7px; line-height: 1.4; }

  footer {
    text-align: center;
    margin-top: 40px;
    color: var(--latte);
    font-size: 0.82rem;
    font-weight: 500;
  }
  footer .heart { color: var(--pink); }
</style>
</head>

  <div class="modal-box">
    <button class="modal-close" onclick="closeRecipe()">✕</button>
    <div id="modalBody"></div>
  </div>

<script>
  const floatEmojis = ['🧁','🍰','🍪','🍩','🍫','🧋','🍮','🍬','🍭','🥐'];
  const floatContainer = document.getElementById('floaties');
  for (let i = 0; i < 16; i++) {
    const f = document.createElement('div');
    f.className = 'floaty';
    f.textContent = floatEmojis[Math.floor(Math.random() * floatEmojis.length)];
    f.style.left = Math.random() * 100 + '%';
    f.style.animationDuration = (14 + Math.random() * 16) + 's';
    f.style.animationDelay = (Math.random() * 20) + 's';
    f.style.fontSize = (1.4 + Math.random() * 1.6) + 'rem';
    floatContainer.appendChild(f);
  }

  const flavourEmoji = {
    'Chocolate': '🍫', 'Vanilla/Cream': '🍦', 'Citrus': '🍋',
    'Caramel': '🍯', 'Fruity/Berry': '🍓', 'Spiced': '🍂',
    'Nutty': '🥜', 'Tropical': '🥥', 'Other': '🧁'
  };

  let activeFlavour = null;

  document.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      if (chip.classList.contains('active')) {
        chip.classList.remove('active');
        activeFlavour = null;
      } else {
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        activeFlavour = chip.dataset.flavour;
      }
      search();
    });
  });

  document.getElementById('query').addEventListener('keydown', e => {
    if (e.key === 'Enter') search();
  });

  async function search() {
    const q = document.getElementById('query').value.trim();
    const results = document.getElementById('results');

    let searchText = q;
    if (activeFlavour) {
      searchText = (q + ' ' + activeFlavour).trim();
    }

    if (!searchText) {
      results.innerHTML = `<div class="welcome"><span class="big">🧁</span><p>type a craving or tap a flavour above<br>and i'll dig through the vault for you~</p></div>`;
      return;
    }

    results.innerHTML = `<div class="loading"><span class="spin">🍩</span><p>digging through the vault...</p></div>`;

    try {
      const response = await fetch('/search?q=' + encodeURIComponent(searchText));
      let matches = await response.json();

      if (activeFlavour) {
        matches = matches.filter(r => r.flavour === activeFlavour);
      }

      if (!matches || matches.length === 0) {
        results.innerHTML = `<div class="welcome"><span class="big">🙀</span><p>hmm, no treats matched that...<br>try another craving!</p></div>`;
        return;
      }

      results.innerHTML = matches.map((r, i) => {
        const scoreText = (r.score !== null && r.score !== undefined)
          ? `📖 match ${Math.round(r.score * 100)}% &middot; recipe #${r.id}`
          : `📖 from the vault &middot; recipe #${r.id}`;
        return `
        <div class="recipe-card" style="animation-delay:${i * 0.08}s">
          <div class="recipe-emoji">${flavourEmoji[r.flavour] || '🧁'}</div>
          <div class="recipe-info">
            <div class="recipe-title">${r.title}</div>
            <div class="recipe-meta">
              <span class="tag flavour">${r.flavour}</span>
              <span class="tag occasion">${r.occasion}</span>
              <span class="tag steps">${r.steps} steps</span>
            </div>
            <div class="recipe-source">${scoreText}</div>
            <button class="view-btn" onclick="viewRecipe(${r.id})">view recipe 🍽️</button>
          </div>
        </div>`;
      }).join('');

    } catch (err) {
      results.innerHTML = `<div class="welcome"><span class="big">😿</span><p>couldn't reach the kitchen...<br>make sure the server is running!</p></div>`;
    }
  }

  async function viewRecipe(id) {
    const modal = document.getElementById('recipeModal');
    const body = document.getElementById('modalBody');
    modal.style.display = 'flex';
    body.innerHTML = `<div class="loading"><span class="spin">🍩</span><p>fetching recipe...</p></div>`;

    try {
      const res = await fetch('/recipe/' + id);
      const r = await res.json();

      const ingredientsList = r.ingredients.length
        ? r.ingredients.map(ing => `<li>${ing}</li>`).join('')
        : '<li>no ingredients listed</li>';

      const stepsList = r.steps.length
        ? r.steps.map(s => `<li>${s.text}</li>`).join('')
        : '<li>no steps listed</li>';

      body.innerHTML = `
        <h2 class="modal-title">${flavourEmoji[r.flavour] || '🧁'} ${r.title}</h2>
        <div class="recipe-meta" style="margin-bottom:18px;">
          <span class="tag flavour">${r.flavour}</span>
          <span class="tag occasion">${r.occasion}</span>
        </div>
        <h3 class="modal-section">🧺 Ingredients</h3>
        <ul class="modal-list">${ingredientsList}</ul>
        <h3 class="modal-section">👩‍🍳 Steps</h3>
        <ol class="modal-list">${stepsList}</ol>
      `;
    } catch (err) {
      body.innerHTML = `<div class="welcome"><span class="big">😿</span><p>couldn't load this recipe...</p></div>`;
    }
  }

  function closeRecipe() {
    document.getElementById('recipeModal').style.display = 'none';
  }
</script>
</body>
</html>
